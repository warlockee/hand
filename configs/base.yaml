model:
  backbone: vit_huge_patch14_dinov2.lvd142m
  img_size: 224

training:
  phase1_epochs: 5
  phase1_lr: 1.0e-3
  phase2_epochs: 80
  phase2_lr: 1.0e-4
  min_lr: 1.0e-6
  batch_size: 64
  weight_decay: 0.01
  max_grad_norm: 1.0
  warmup_epochs: 3
  num_workers: 8

loss:
  w_joint: 5.0
  w_vertex: 5.0
  w_reproj: 5.0
  w_mano: 0.1
  w_edge: 1.0

data:
  data_dir: data/freihand
  img_size: 224
  augment: true
  scale_to_mm: 1000.0
