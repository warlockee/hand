# orze.yaml — FreiHand 3D Hand Pose Estimation

train_script: train.py
ideas_file: ideas.md
base_config: configs/base.yaml
results_dir: results
python: /home/ec2-user/hand/venv/bin/python3

train_extra_env:
  HF_HOME: /home/ec2-user/.cache/huggingface

nested_config_whitelist: [model, training, loss, data]

timeout: 14400
poll: 30
stall_minutes: 30
max_idea_failures: 3
min_disk_gb: 5

gpu_scheduling:
  mode: exclusive

gc:
  enabled: true
  keep_top: 5
  keep_recent: 3

report:
  title: "FreiHand Hand Pose"
  primary_metric: pa_mpjpe
  sort: ascending
  columns:
    - {key: "pa_mpjpe", label: "PA-MPJPE (mm)", fmt: ".2f"}
    - {key: "pa_mpvpe", label: "PA-MPVPE (mm)", fmt: ".2f"}
    - {key: "f_at_5", label: "F@5mm", fmt: ".4f"}
    - {key: "f_at_15", label: "F@15mm", fmt: ".4f"}
    - {key: "training_time", label: "Time(s)", fmt: ".0f"}

notifications:
  enabled: true
  on: [completed, failed, new_best, heartbeat]
  heartbeat_interval: 1800
  channels:
    - type: telegram
      bot_token: "8214019299:AAEbnK-wEqabNue7EHbVhfwlniLB3dtC68Y"
      chat_id: "PENDING"

roles:
  research:
    mode: research
    backend: anthropic
    skills:
      - "@sop:research_base"
      - ./RESEARCH_RULES.md
    cooldown: 300
    timeout: 600
